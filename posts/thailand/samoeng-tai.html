  <h2>Karen Hill Tribe</h2>
  <p>An early start to the day to visit a Karen Hill Tribe community two hours deep into the mountains.</p>
  <figure class="photo-block">
    <img src="https://travelswithjessica.ca/wp-content/uploads/2022/09/81862467_10156613115056361_8041453971082051584_n.jpg" alt="En route through a Hmong village. Here they are growing garlic. In an effort to stop the booming opium business in Thailand, the previous King (Rama 9) went to visit the hill tribes who were growing poppies and helped them shift to less nefarious crops. The peaceful hill tribes were happy to oblige when presented not only with an explanation of the problem but with a doable and practical solution. A classic example of respectful negotiations." loading="lazy">
    <figcaption>En route through a Hmong village. Here they are growing garlic. In an effort to stop the booming opium business in Thailand, the previous King (Rama 9) went to visit the hill tribes who were growing poppies and helped them shift to less nefarious crops. The peaceful hill tribes were happy to oblige when presented not only with an explanation of the problem but with a doable and practical solution. A classic example of respectful negotiations.</figcaption>
