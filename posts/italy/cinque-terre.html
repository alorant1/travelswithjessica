<h2>Charming Cinque Terre</h2>

  <figcaption>Sitting 100m above the water, the way to access the train is down the Lardarina, a series of switchback flights of 382 steps, not what you looking forward to after a hike. There’s a cheater bus available for the young woman we saw who, on arrival, got halfway along the platform to the steps and said there was no way she was climbing those!</figcaption>

<figure class="photo-block">
  <img src="https://travelswithjessica.ca/wp-content/uploads/2022/10/279707000_10158382909081361_7442337355483191346_n.jpeg" alt="Some of the hiking trails have been closed since 2010 (Manarola to Corniglia) and 2012 (Riomaggiore to Manarola) due to landslides. A bit mind-boggling to know that 12 years later they are still closed. With such an enormous reliance on tourism you would think that repairs would have been prioritized. Well, they were supposed to reopen in 2015 but further landslides thwarted those efforts. Centuries old terracing (some of which started in 900AD) is crumbling; interest in farming is waning, many terraces having been abandoned,so upkeep of the terraces is shrinking. This is not easy work. We saw people working along the paths breaking stone and rebuilding walls, massive bags of stone by their sides. The only way to get to these walls is hiking so it begs the question: how do these bags of stone get up there? Helicopters! The helicopters go back and forth picking up and dropping off the loads of stone. Traditionally no cement is used. It’s a masterful placement of large and small rocks that create the terraces and prevent erosion. All this is on the backs of the grape growers who are called Heroic Winemakers. And the wine is very good!" loading="lazy">
  <figcaption>Some of the hiking trails have been closed since 2010 (Manarola to Corniglia) and 2012 (Riomaggiore to Manarola) due to landslides. A bit mind-boggling to know that 12 years later they are still closed. With such an enormous reliance on tourism you would think that repairs would have been prioritized. Well, they were supposed to reopen in 2015 but further landslides thwarted those efforts. Centuries old terracing (some of which started in 900AD) is crumbling; interest in farming is waning, many terraces having been abandoned,so upkeep of the terraces is shrinking. This is not easy work. We saw people working along the paths breaking stone and rebuilding walls, massive bags of stone by their sides. The only way to get to these walls is hiking so it begs the question: how do these bags of stone get up there? Helicopters! The helicopters go back and forth picking up and dropping off the loads of stone. Traditionally no cement is used. It’s a masterful placement of large and small rocks that create the terraces and prevent erosion. All this is on the backs of the grape growers who are called Heroic Winemakers. And the wine is very good!</figcaption>
</figure>
