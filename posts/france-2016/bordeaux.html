  <figcaption>We used Bordeaux as a base and took a couple of day trips. First day we hopped on a train to Saint Émilion, merlot central. This stunningly beautiful area is the Bordeaux region’s the oldest active wine producing appellation, having been making wine since the first century AD.</figcaption>
</figure>

  <figcaption>They are very serious here about wine and appellations. Wine from one appellation may be sold in another appellation’s area but may not be bottled there. So if you have vineyards across other appellation lines, you can’t make use of your bottling facilities one one location by bringing over your wine from next door for bottling. Makes Canada’s provincial border control seem like nothing.</figcaption>
</figure>
<figure class="photo-block">
