name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check secrets are set
        run: |
          if [ -z "$CF_TOKEN" ]; then echo "TOKEN EMPTY"; else echo "TOKEN SET length=${#CF_TOKEN}"; fi
          if [ -z "$CF_ACCOUNT" ]; then echo "ACCOUNT EMPTY"; else echo "ACCOUNT SET length=${#CF_ACCOUNT}"; fi
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: travelswithjessica
          directory: .
